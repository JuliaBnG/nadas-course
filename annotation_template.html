<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Instructions Template</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlightjs-line-numbers.js/2.8.0/highlightjs-line-numbers.min.js"></script>
    <!-- Add languages you expect to use -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/julia.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/bash.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/toml.min.js"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <script>
        window.MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']]
            }
        };
    </script>
    <style>
        * {
            box-sizing: border-box;
        }

        :root {
            --primary-color: #2c3e50;
            --link-color: #3498db;
            --bg-light: #f8f9fa;
            --border-color: #e0e0e0;
        }

        body {
            margin: 0;
            display: flex;
            height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #333;
            overflow: hidden;
            width: 100vw;
        }

        .toc-pane {
            flex: 0 0 250px;
            min-width: 150px;
            background: var(--bg-light);
            padding: 2rem 1.5rem;
            overflow-y: auto;
            border-right: 1px solid var(--border-color);
            font-size: 0.9rem;
        }

        .resizer {
            width: 16px;
            cursor: col-resize;
            background: transparent;
            z-index: 100;
            flex-shrink: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 -8px;
            position: relative;
        }

        .resizer::after {
            content: "";
            width: 2px;
            height: 40px;
            background: var(--border-color);
            border-radius: 2px;
            transition: background 0.2s, width 0.2s, height 0.2s;
        }

        .resizer:hover::after, .resizer.dragging::after {
            background: var(--link-color);
            width: 4px;
            height: 60px;
        }

        .toc-pane h3 {
            font-size: 1.1rem;
            margin-top: 0;
            padding-bottom: 0.5rem;
            border-bottom: 2px solid var(--border-color);
        }

        .toc-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .toc-item {
            margin: 0.5rem 0;
        }

        .toc-item a {
            text-decoration: none;
            color: #555;
            transition: color 0.2s;
        }

        .toc-item a:hover {
            color: var(--link-color);
        }

        .toc-item.level-2 { margin-left: 0; font-weight: bold; }
        .toc-item.level-3 { margin-left: 1rem; }

        .main-flow {
            flex: 1;
            padding: 2rem 3rem;
            overflow-y: auto;
            background: white;
            box-shadow: 2px 0 5px rgba(0,0,0,0.05);
            z-index: 1;
            min-width: 300px;
        }

        .annotation-pane {
            flex: 0 0 400px;
            min-width: 200px;
            background: var(--bg-light);
            padding: 2rem;
            overflow-y: auto;
            border-left: 1px solid var(--border-color);
        }

        .annotation-link {
            color: var(--link-color);
            border-bottom: 1px dashed var(--link-color);
            cursor: pointer;
            transition: all 0.2s;
        }

        .annotation-link:hover {
            background: rgba(52, 152, 219, 0.1);
        }

        .annotation-content {
            display: none;
            line-height: 1.6;
        }

        .annotation-content.active {
            display: block;
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateX(10px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .placeholder-text {
            color: #7f8c8d;
            font-style: italic;
            text-align: center;
            margin-top: 4rem;
        }

        h1, h2, h3 { color: var(--primary-color); }

        code {
            color: #d63384; /* Deep Pink */
            background-color: #f8f9fa;
            padding: 2px 4px;
            border-radius: 4px;
            font-size: 0.9em;
            font-family: 'Courier New', Courier, monospace;
        }

        /* Feedback Modal */
        #feedback-modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0; top: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.5);
        }

        .modal-content {
            background-color: white;
            margin: 10% auto;
            padding: 30px;
            border-radius: 8px;
            width: 400px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .modal-content h3 { margin-top: 0; }
        .modal-content input, .modal-content textarea {
            width: 100%;
            margin-bottom: 15px;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;
        }
        .modal-content textarea { height: 100px; }
        .modal-actions { text-align: right; }
        .btn { padding: 8px 16px; border: none; border-radius: 4px; cursor: pointer; }
        .btn-primary { background: var(--link-color); color: white; }
        .btn-secondary { background: #eee; margin-right: 10px; }

        /* Line Numbers Style */
        .hljs-ln-numbers {
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;

            text-align: right;
            color: #ccc;
            border-right: 1px solid #CCC;
            vertical-align: top;
            padding-right: 5px;
        }

        .hljs-ln-code {
            padding-left: 10px;
        }
    </style>
</head>
<body>

    <!-- FEEDBACK MODAL -->
    <div id="feedback-modal">
        <div class="modal-content">
            <h3 id="feedback-title">Feedback: Topic</h3>
            <input type="text" id="fb-reader" placeholder="Your Name (Optional)">
            <textarea id="fb-content" placeholder="Your feedback..."></textarea>
            <div class="modal-actions">
                <button class="btn btn-secondary" onclick="closeFeedback()">Cancel</button>
                <button class="btn btn-primary" onclick="submitFeedback()">Submit</button>
            </div>
        </div>
    </div>

    <!-- TABLE OF CONTENTS -->
    <div class="toc-pane" id="toc-container">
        <h3>Contents</h3>
        <ul class="toc-list" id="toc-list">
<!-- TOC_START -->
<!-- TOC_END -->
        </ul>
    </div>

    <div class="resizer" id="resizer-left"></div>

    <!-- PRIMARY CONTENT AREA -->
    <div class="main-flow" id="main-content">
<!-- MAIN_START -->
<!-- MAIN_END -->
    </div>

    <div class="resizer" id="resizer-right"></div>
    <div class="annotation-pane" id="annotation-container">
<!-- ANNO_START -->
<!-- ANNO_END -->
    </div>

    <script>
        let currentFeedbackTopic = '';

        function openFeedback(topic) {
            currentFeedbackTopic = topic;
            document.getElementById('feedback-title').innerText = 'Feedback: ' + topic;
            document.getElementById('feedback-modal').style.display = 'block';
        }

        function closeFeedback() {
            document.getElementById('feedback-modal').style.display = 'none';
        }

        function submitFeedback() {
            const reader = document.getElementById('fb-reader').value;
            const content = document.getElementById('fb-content').value;

            if (!content) {
                alert("Please enter your feedback.");
                return;
            }

            fetch('/feedback', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    topic: currentFeedbackTopic,
                    reader: reader || 'Anonymous',
                    content: content
                })
            })
            .then(response => {
                if (response.ok) {
                    alert("Feedback submitted! Thank you.");
                    closeFeedback();
                    document.getElementById('fb-reader').value = '';
                    document.getElementById('fb-content').value = '';
                } else {
                    alert("Error submitting feedback. Is the server running?");
                }
            })
            .catch(error => {
                console.error('Error:', error);
                alert("Could not connect to the feedback server.");
            });
        }

        document.addEventListener('DOMContentLoaded', () => {
            hljs.highlightAll();
            document.querySelectorAll('code.line-numbers').forEach((block) => {
                hljs.lineNumbersBlock(block);
            });

            // Resizing logic
            const resizerLeft = document.getElementById('resizer-left');
            const resizerRight = document.getElementById('resizer-right');
            const tocPane = document.getElementById('toc-container');
            const annotationPane = document.getElementById('annotation-container');

            function initResizer(resizer, pane, isLeft) {
                let x = 0;
                let w = 0;

                const mouseDownHandler = function (e) {
                    x = e.clientX;
                    const styles = window.getComputedStyle(pane);
                    w = parseInt(styles.width, 10);

                    document.addEventListener('mousemove', mouseMoveHandler);
                    document.addEventListener('mouseup', mouseUpHandler);
                    resizer.classList.add('dragging');
                    document.body.style.cursor = 'col-resize';
                    document.body.style.userSelect = 'none';
                    e.preventDefault();
                };

                const mouseMoveHandler = function (e) {
                    const dx = e.clientX - x;
                    const newWidth = isLeft ? w + dx : w - dx;
                    const minW = isLeft ? 150 : 200;
                    if (newWidth >= minW) {
                        pane.style.flexBasis = `${newWidth}px`;
                        pane.style.width = `${newWidth}px`;
                    }
                };

                const mouseUpHandler = function () {
                    document.removeEventListener('mousemove', mouseMoveHandler);
                    document.removeEventListener('mouseup', mouseUpHandler);
                    resizer.classList.remove('dragging');
                    document.body.style.removeProperty('cursor');
                    document.body.style.removeProperty('user-select');
                };

                resizer.addEventListener('mousedown', mouseDownHandler);
            }

            initResizer(resizerLeft, tocPane, true);
            initResizer(resizerRight, annotationPane, false);

            const links = document.querySelectorAll('.annotation-link');
            const contents = document.querySelectorAll('.annotation-content');
            const defaultMsg = document.getElementById('default-msg');

            links.forEach(link => {
                link.addEventListener('click', (e) => {
                    const targetId = e.target.getAttribute('data-target');
                    
                    if (e.target.classList.contains('feedback-link')) {
                        openFeedback(targetId);
                        return;
                    }

                    // Hide default message
                    defaultMsg.style.display = 'none';

                    // Deactivate all previous annotations
                    contents.forEach(el => el.classList.remove('active'));

                    // Activate the target
                    const target = document.getElementById(targetId);
                    if (target) {
                        target.classList.add('active');
                    }
                });
            });
        });
    </script>
</body>
</html>
